version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: maravilla_postgres
    environment:
      POSTGRES_USER: maravilla_user
      POSTGRES_PASSWORD: maravilla_password
      POSTGRES_DB: maravilla_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maravilla_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: maravilla_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
